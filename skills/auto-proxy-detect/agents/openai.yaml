interface:
  display_name: "Auto Proxy Detect"
  short_description: "Diagnose proxy health, target reachability, and choose the safest network execution path"
  default_prompt: "Use $auto-proxy-detect to detect whether a local proxy is listening on port 7890, validate whether it works as an HTTP/HTTPS proxy, probe the target resource when known, and recommend the best execution mode before running network commands."

policy:
  allow_implicit_invocation: true
